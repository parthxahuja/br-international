<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .experience-box {
    background: #f4b400;
    padding: 25px 35px;
    border-radius: 60px 0 60px 0;
    display: inline-flex;
    align-items: center;
    gap: 15px;
    color: #fff;
    font-weight: 600;
}

.experience-icon {
    background: #fff;
    color: #f4b400;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
}

.experience-text h4 {
    margin: 0;
    font-size: 18px;
}

.experience-text p {
    margin: 0;
    font-size: 14px;
}
</style>
<body>
    <div class="experience-box">
    <div class="experience-icon">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <div class="experience-text">
        <h4>Admission Open</h4>
        <p>Session 2026–27</p>
    </div>
</div>
</body>
</html>
